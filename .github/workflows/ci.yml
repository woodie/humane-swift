name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4

    - name: Build
      run: swift build -v -Xswiftc -solver-expression-time-limit=600

    - name: Test
      run: swift test -v -Xswiftc -solver-expression-time-limit=600
